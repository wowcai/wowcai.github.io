<body data-title-zh="高考重点高校录取分数线预测 | 我猜 wowcai" data-title-en="Gaokao Key University Admission Forecast | wowcai">
  <header class="site-header home-nav-shell" data-shared-nav data-active-page="gaokao" data-nav-variant="gaokao"></header>

  <main class="compact-page gaokao-page gaokao-prediction-page" data-gaokao-prediction-page>
    <section class="gaokao-hero">
      <div class="container gaokao-hero-grid">
        <div class="gaokao-hero-copy">
          <p class="kicker" data-zh="重点高校录取预测" data-en="Key University Admission Forecast">重点高校录取预测</p>
          <h1 data-zh="高考重点高校录取分数线预测" data-en="Gaokao Key University Admission Forecast">高考重点高校录取分数线预测</h1>
          <p data-zh="选择生源省份和科类后，在高校地图上查看重点高校面向该省该科类的预测分数线。" data-en="Pick a source province and subject track, then explore predicted admission lines for key universities on the map.">选择生源省份和科类后，在高校地图上查看重点高校面向该省该科类的预测分数线。</p>
        </div>
      </div>
    </section>

    <section class="section compact-section gaokao-workbench-section">
      <div class="container gaokao-simple-layout">
        <article class="module-card gaokao-control-panel gaokao-control-panel--simple">
          <div class="module-head gaokao-panel-head">
            <div>
              <p class="kicker" data-zh="选择入口" data-en="Province entry">选择入口</p>
              <h2 data-zh="选择省份和科类" data-en="Choose province & subject">选择省份和科类</h2>
              <p data-zh="切换后，下方高校地图会同步显示对应预测分数线。" data-en="Switching updates the university map below with the matching predicted score lines.">切换后，下方高校地图会同步显示对应预测分数线。</p>
            </div>
            <div class="gaokao-data-badge" data-gaokao-data-badge>浙江 / 上海市预测数据</div>
          </div>

          <div class="gaokao-control-grid">
            <label class="gaokao-field">
              <span data-zh="生源省份" data-en="Source province">生源省份</span>
              <select data-gaokao-province-select aria-label="选择省份"></select>
            </label>
            <label class="gaokao-field">
              <span data-zh="科类 / 批次" data-en="Subject / batch">科类 / 批次</span>
              <select data-gaokao-subject-select aria-label="选择科类或批次"></select>
            </label>
          </div>

          <div class="gaokao-quick-row" data-gaokao-province-quick-list aria-label="热门省份快捷选择"></div>
        </article>

        <article class="module-card gaokao-map-panel">
          <div class="module-head gaokao-map-head">
            <div>
              <p class="kicker" data-zh="高校分数地图" data-en="University score map">高校分数地图</p>
              <h2 data-gaokao-map-heading>重点高校预测地图</h2>
              <p data-gaokao-map-summary>选择省份和科类后查看预测分数线。</p>
            </div>
            <span class="gaokao-warning-chip" data-zh="预测仅供参考" data-en="For reference only">预测仅供参考</span>
          </div>

          <div class="gaokao-map-body">
            <div class="gaokao-map-main">
              <div class="gaokao-prediction-map-shell">
                <div class="gaokao-prediction-map" data-gaokao-prediction-map data-map-source-height="980" data-map-crop-height="700" aria-label="重点高校预测分数线地图"></div>
              </div>
              <p class="gaokao-map-note" data-zh="预测数据涵盖 2021-2025 往年分数/位次与 2026 年模型预测值；最终以各省市教育考试院和高校招生章程为准。" data-en="Predictions cover 2021-2025 historical scores/ranks and the 2026 model forecast; each provincial examination authority and university admission rules are authoritative.">预测数据涵盖 2021-2025 往年分数/位次与 2026 年模型预测值；最终以各省市教育考试院和高校招生章程为准。</p>
            </div>

          </div>
        </article>
      </div>
    </section>
  </main>

  <div class="gaokao-province-modal" data-gaokao-province-modal aria-hidden="true">
    <div class="gaokao-detail-backdrop" data-close-gaokao-province></div>
    <section class="gaokao-detail-card gaokao-province-card" role="dialog" aria-modal="true" aria-labelledby="gaokao-province-title">
      <button class="modal-close gaokao-detail-close" type="button" data-close-gaokao-province aria-label="关闭省份高校列表">×</button>
      <div class="gaokao-province-body" data-gaokao-province-body></div>
    </section>
  </div>

  <div class="gaokao-detail-modal" data-gaokao-detail-modal aria-hidden="true">
    <div class="gaokao-detail-backdrop" data-close-gaokao-detail></div>
    <section class="gaokao-detail-card" role="dialog" aria-modal="true" aria-labelledby="gaokao-detail-title">
      <button class="modal-close gaokao-detail-close" type="button" data-close-gaokao-detail aria-label="关闭高校详情">×</button>
      <div class="gaokao-detail-body" data-gaokao-detail-body></div>
    </section>
